                  - generic [ref=e100]: Selects and/or prepares medications, under direct supervision, as indicated on the patient medication orders. Places medications in patient boxes or in designated area for pharmacist to review, sends/delivers medications to nursing units as required. Investigates missing medication requests Charges/credits patients for medications and intravenous solutions as appropriate. Restocks unused and credited returned medications
                  - generic [ref=e105]: Attends to customers and answers telephones in a courteous and timely manner. Serves as a liaison between the customer and the pharmacist
                  - generic [ref=e110]: Using automated dispensing technology or requisition, restocks medications to nursing and ancillary areas after checked by a pharmacist. Restocks medications to all areas outside automated dispensing technology which may include but not be limited to trays, code carts and emergency boxes. Adds users to the automatic dispensing technology database as per policy. Investigates discrepancies in automated dispensing technology. Troubleshoots automated technology malfunctions
                  - generic [ref=e115]: Identifies medications and other items for reorder as necessary to maintain a continuous inventory of medications and supplies. Receives, checks-in, and restocks medications ordered through wholesaler and other vendors
                  - generic [ref=e120]: Compounds specialty drug products. Repackages bulk medications into unit of use packaging. Completes accurate documentation of items compounded and repackaged
                  - generic [ref=e125]: Assists in preparing and labeling of intravenous medication orders including total parenteral nutrition products and chemotherapy products using proper sterile and aseptic technique
                  - generic [ref=e130]: Under the supervision of a pharmacist, utilizes education and pharmacy skills in assessing and formulating potential recommendations to physicians to help ensure quality and economical drug therapy, and positive patient outcomes. May provide information (under pharmacist supervision) to physicians, nurses, and others regarding medication therapy, medication systems, drug product guidelines, laws and regulations, medication formulary, and other topics related to the medication use system. Medication assessments may be performed with special consideration given to medication safety and the needs of the specific patient age groups served
                  - generic [ref=e135]: Performs quality control activities such as monthly nursing unit checks and pharmacy section checks in a timely manner. Completes documentation on refrigerator temperatures, intravenous hood cleaning, and equipment maintenance activities as required
                  - generic [ref=e140]: Performs all functions according to established policies, procedures, regulatory and accreditation requirements, as well as applicable professional standards. Provides all customers of Foundation Health Partners with an excellent service experience by consistently demonstrating our core and leader behaviors each and every day
